<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diashow Grossmami</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cormorant Garamond', serif;
      background: #000;
      color: #fff;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      user-select: none;
    }

    /* ── Dashboard ── */
    #dashboard {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.8s ease;
    }
    #dashboard.hidden { opacity: 0; pointer-events: none; }

    #dashboard-bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    #dashboard-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('background/Bild%20Mami%20Berg.jpg') center top/cover no-repeat;
      filter: blur(30px) brightness(0.7);
      transform: scale(1.1);
    }
    #dashboard-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url('background/Bild%20Mami%20Berg.jpg') center top/contain no-repeat;
    }

    .dashboard-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .dashboard-content h1 {
      font-size: 3rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
      margin-bottom: 1rem;
    }

    .show-buttons {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 1rem;
    }

    .show-btn {
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      color: #fff;
      padding: 1.4rem 2.2rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      min-width: 220px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }

    .show-btn:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
    }

    .show-btn span {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      opacity: 0.6;
      margin-top: 0.5rem;
      text-transform: uppercase;
    }

    /* ── Slideshow ── */
    #slideshow {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
      display: flex;
      flex-direction: column;
    }
    #slideshow.active { opacity: 1; pointer-events: all; }

    /* ── Top bar ── */
    .slide-topbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      z-index: 30;
    }

    .back-btn {
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 100px;
      color: #fff;
      padding: 0.6rem 1.4rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .back-btn:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.35);
    }

    .slide-title {
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      opacity: 0.6;
    }

    /* ── Middle: image + side nav ── */
    .slide-main {
      flex: 1;
      display: flex;
      align-items: stretch;
      min-height: 0;
    }

    .slide-area {
      flex: 1;
      position: relative;
      min-width: 0;
    }

    .slide {
      position: absolute;
      inset: 0;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    .slide.current { opacity: 1; }

    .side-btn {
      flex-shrink: 0;
      width: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 2.5rem;
      cursor: pointer;
      transition: color 0.3s ease;
      font-family: 'Cormorant Garamond', serif;
    }
    .side-btn:hover { color: rgba(255,255,255,0.9); }

    /* ── Bottom bar ── */
    .slide-controls {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 1rem 1.5rem;
      z-index: 30;
    }

    .ctrl-btn {
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      color: #fff;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ctrl-btn:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.35);
      transform: scale(1.08);
    }

    .slide-counter {
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      opacity: 0.6;
      font-weight: 300;
      min-width: 4rem;
      text-align: center;
    }

    /* ── Progress bar ── */
    .progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 3px;
      background: rgba(255,255,255,0.4);
      border-radius: 3px;
      box-shadow: 0 0 8px rgba(255,255,255,0.2);
      z-index: 30;
      transition: width 0.3s linear;
    }

    /* ── Loading ── */
    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 35;
      font-size: 1rem;
      letter-spacing: 0.2em;
      font-weight: 300;
      opacity: 0.5;
    }
    .loading.hidden { display: none; }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      #dashboard-bg::after {
        background-size: cover;
      }
      .dashboard-content h1 {
        font-size: 2.2rem;
        margin-bottom: 0.5rem;
      }
      .show-buttons {
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      .show-btn {
        min-width: 0;
        width: 80vw;
        max-width: 300px;
        padding: 1rem 1.5rem;
        font-size: 1.1rem;
        border-radius: 12px;
      }
      .slide-topbar {
        padding: 0.7rem 1rem;
      }
      .back-btn {
        padding: 0.5rem 0.8rem;
        font-size: 0.8rem;
      }
      .slide-title {
        font-size: 0.85rem;
      }
      .side-btn {
        width: 36px;
        font-size: 1.8rem;
      }
      .slide-controls {
        padding: 0.7rem 1rem;
        gap: 1rem;
      }
      .ctrl-btn {
        width: 42px;
        height: 42px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <!-- Dashboard -->
  <div id="dashboard">
    <div id="dashboard-bg"></div>
    <div class="dashboard-content">
      <h1>Grossmami</h1>
      <div class="show-buttons">
        <button class="show-btn" onclick="startShow('ueber-den-wolken')">
          &Uuml;ber den Wolken
          <span>Diashow starten</span>
        </button>
        <button class="show-btn" onclick="startShow('wonderful-world')">
          Wonderful World
          <span>Diashow starten</span>
        </button>
        <button class="show-btn" onclick="startShow('over-the-rainbow')">
          Over the Rainbow
          <span>Diashow starten</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Slideshow -->
  <div id="slideshow">
    <div class="loading" id="loading">Laden...</div>
    <div class="progress-bar" id="progressBar"></div>
    <div class="slide-topbar">
      <button class="back-btn" onclick="backToDashboard()">&larr; Zur&uuml;ck</button>
      <div class="slide-title" id="slideTitle"></div>
    </div>
    <div class="slide-main">
      <button class="side-btn" onclick="prevSlide()">&#8249;</button>
      <div class="slide-area">
        <div id="slides"></div>
      </div>
      <button class="side-btn" onclick="nextSlide()">&#8250;</button>
    </div>
    <div class="slide-controls">
      <button class="ctrl-btn" id="playPauseBtn" onclick="toggleAutoplay()">&#9646;&#9646;</button>
      <span class="slide-counter" id="slideCounter">1 / 1</span>
    </div>
  </div>

  <script>
    const shows = {
      'over-the-rainbow': [
        '01.jpg','02.jpg','03.jpg','04.jpg','05.jpg','06.jpg','07.jpg','08.jpg','09.jpg','10.jpg',
        '11.jpg','12.jpg','13.jpg','14.jpg','15.jpg','16.jpg','17.jpg','18.jpg','19.jpg','20.jpg',
        '21.jpg','22.jpg','23.jpg','24.jpg','25.jpg','26.jpg','27.jpg','28.jpg','29.jpg'
      ],
      'ueber-den-wolken': [
        '01.jpg','02.jpg','03.jpg','04.jpg','05.jpg','06.jpg','07.jpg','08.jpg','09.jpg','10.jpg',
        '11.jpg','12.jpg','13.jpg','14.jpg','15.jpg','16.jpg','17.jpg','18.jpg','19.jpg','20.jpg',
        '21.jpg','22.jpg','23.jpg','24.jpg','25.jpg','26.jpg','27.jpg','28.jpg','29.jpg','30.jpg'
      ],
      'wonderful-world': [
        '01.jpg','02.jpg','03.jpg','04.jpg','05.jpg','06.jpg','07.jpg','08.jpg','09.jpg','10.jpg',
        '11.jpg','12.jpg','13.jpg','14.jpg','15.jpg','16.jpg','17.jpg','18.jpg','19.jpg','20.jpg'
      ]
    };

    const titles = {
      'over-the-rainbow': 'Over the Rainbow',
      'ueber-den-wolken': 'Über den Wolken',
      'wonderful-world': 'What a Wonderful World'
    };

    let currentShow = null;
    let currentIndex = 0;
    let autoplayInterval = null;
    let isPlaying = true;
    const AUTOPLAY_DELAY = 8000;

    function startShow(name) {
      currentShow = name;
      currentIndex = 0;
      isPlaying = true;

      const slidesContainer = document.getElementById('slides');
      const loading = document.getElementById('loading');
      slidesContainer.innerHTML = '';
      loading.classList.remove('hidden');

      document.getElementById('slideTitle').textContent = titles[name];

      const images = shows[name];
      let loaded = 0;

      images.forEach((img, i) => {
        const div = document.createElement('div');
        div.className = 'slide' + (i === 0 ? ' current' : '');
        div.style.backgroundImage = `url('${encodeURI(name + '/' + img)}')`;
        slidesContainer.appendChild(div);

        const preload = new Image();
        preload.onload = preload.onerror = () => {
          loaded++;
          if (loaded === images.length) {
            loading.classList.add('hidden');
          }
        };
        preload.src = name + '/' + img;
      });

      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('slideshow').classList.add('active');

      updateCounter();
      updateProgress();
      startAutoplay();
    }

    function backToDashboard() {
      stopAutoplay();
      document.getElementById('slideshow').classList.remove('active');
      document.getElementById('dashboard').classList.remove('hidden');
      currentShow = null;
    }

    function goToSlide(index) {
      const slides = document.querySelectorAll('.slide');
      if (!slides.length) return;

      slides[currentIndex].classList.remove('current');
      currentIndex = (index + slides.length) % slides.length;
      slides[currentIndex].classList.add('current');
      updateCounter();
      updateProgress();
    }

    function nextSlide() {
      goToSlide(currentIndex + 1);
      if (isPlaying) restartAutoplay();
    }

    function prevSlide() {
      goToSlide(currentIndex - 1);
      if (isPlaying) restartAutoplay();
    }

    function updateCounter() {
      if (!currentShow) return;
      const total = shows[currentShow].length;
      document.getElementById('slideCounter').textContent = `${currentIndex + 1} / ${total}`;
    }

    function updateProgress() {
      if (!currentShow) return;
      const total = shows[currentShow].length;
      const pct = ((currentIndex + 1) / total) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
    }

    function startAutoplay() {
      stopAutoplay();
      autoplayInterval = setInterval(() => nextSlide(), AUTOPLAY_DELAY);
      document.getElementById('playPauseBtn').innerHTML = '&#9646;&#9646;';
      isPlaying = true;
    }

    function stopAutoplay() {
      clearInterval(autoplayInterval);
      autoplayInterval = null;
    }

    function restartAutoplay() {
      stopAutoplay();
      autoplayInterval = setInterval(() => nextSlide(), AUTOPLAY_DELAY);
    }

    function toggleAutoplay() {
      if (isPlaying) {
        stopAutoplay();
        isPlaying = false;
        document.getElementById('playPauseBtn').innerHTML = '&#9654;';
      } else {
        startAutoplay();
      }
    }

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      if (!currentShow) return;
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
      if (e.key === 'Escape') backToDashboard();
    });

    // Touch support
    let touchStartX = 0;
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      document.getElementById('slideshow').classList.add('touch');
    });
    document.addEventListener('touchend', (e) => {
      if (!currentShow) return;
      const diff = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(diff) > 50) {
        diff < 0 ? nextSlide() : prevSlide();
      }
      setTimeout(() => document.getElementById('slideshow').classList.remove('touch'), 3000);
    });
  </script>
</body>
</html>
